<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#07091f" />
    <title>Страница не найдена — PRIME ACADEMY</title>
    <style>
      :root {
        color: #171529;
        background: #fbfaff;
        font-family: Inter, "Segoe UI", system-ui, sans-serif;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
      }

      main {
        width: min(100%, 560px);
        padding: 34px;
        border: 1px solid rgba(21, 17, 65, 0.14);
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 20px 55px rgba(23, 13, 84, 0.14);
        text-align: center;
      }

      span {
        display: block;
        color: #073bff;
        font-size: 64px;
        font-weight: 900;
      }

      h1 {
        margin: 12px 0;
        font-size: clamp(32px, 7vw, 48px);
        line-height: 1;
      }

      p {
        color: #6e6986;
        line-height: 1.6;
      }

      div {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-top: 22px;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        padding: 0 20px;
        border-radius: 8px;
        color: #fff;
        background: #070714;
        font-weight: 800;
        text-decoration: none;
      }

      a + a {
        color: #070714;
        border: 1px solid rgba(21, 17, 65, 0.14);
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <main>
      <span>404</span>
      <h1>Страница не найдена</h1>
      <p>Похоже, ссылка изменилась или раздел ещё не добавлен. Вернитесь на главную или выберите нужный курс.</p>
      <div>
        <a href="/">На главную</a>
        <a href="/#courses">К курсам</a>
      </div>
    </main>
  </body>
</html>
